services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Applies merge.cpf on every startup (system mode label, etc.)
      - ISC_CPF_MERGE_FILE=/home/irisowner/dev/merge.cpf
      # Durable %SYS: relocate instance data (databases, config, logs) onto the
      # named volume below so it survives `docker compose down` / rebuilds.
      - ISC_DATA_DIRECTORY=/durable/irissys
    # Run iris.script after IRIS starts (first boot and every subsequent boot).
    # It creates the IRISDEV namespace if missing and (re)loads src/.
    command: -a "iris session iris < /home/irisowner/dev/iris.script"
    ports:
      - "1972:1972"    # superserver (SQL / drivers)
      - "52773:52773"  # management portal / web
    volumes:
      - ./:/home/irisowner/dev      # bind mount: live source editing
      - iris-data:/durable          # named volume: persisted IRIS data

volumes:
  iris-data:
